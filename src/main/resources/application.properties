spring.application.name=Bitespeed
# Server Configuration
server.port=8080
# Database Configuration (Update with your local MySQL credentials)
spring.datasource.url=jdbc:mysql://localhost:3306/bitespeed?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1445
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect